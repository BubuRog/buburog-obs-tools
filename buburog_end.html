<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      width: 520px;
      height: 340px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #frame {
      position: relative;
      width: 500px;
      height: 320px;
    }

    #bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
      border: 2px solid #333;
    }

    .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #666;
      border-style: solid;
      z-index: 10;
    }
    .corner-tl { top: 4px; left: 4px; border-width: 3px 0 0 3px; }
    .corner-tr { top: 4px; right: 4px; border-width: 3px 3px 0 0; }
    .corner-bl { bottom: 4px; left: 4px; border-width: 0 0 3px 3px; }
    .corner-br { bottom: 4px; right: 4px; border-width: 0 3px 3px 0; }

    .corner::after {
      content: '◆';
      position: absolute;
      color: #555;
      font-size: 10px;
    }
    .corner-tl::after { top: -8px; left: -8px; }
    .corner-tr::after { top: -8px; right: -8px; }
    .corner-bl::after { bottom: -8px; left: -8px; }
    .corner-br::after { bottom: -8px; right: -8px; }

    .border-h {
      position: absolute;
      left: 32px;
      right: 32px;
      height: 1px;
      background: linear-gradient(to right, transparent, #555, #777, #555, transparent);
      z-index: 10;
    }
    .border-h.top { top: 4px; }
    .border-h.bot { bottom: 4px; }

    .border-v {
      position: absolute;
      top: 32px;
      bottom: 32px;
      width: 1px;
      background: linear-gradient(to bottom, transparent, #555, #777, #555, transparent);
      z-index: 10;
    }
    .border-v.left  { left: 4px; }
    .border-v.right { right: 4px; }

    #video-wrapper {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      bottom: 38px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 36px;
      background: linear-gradient(to right, #0a0a0a, #1a1a1a, #0a0a0a);
      border-top: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      z-index: 10;
    }

    #label span {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: #888;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    #label .dot { color: #444; font-size: 8px; }

    .ornament {
      position: absolute;
      color: #444;
      font-size: 14px;
      z-index: 10;
    }
    .ornament.top    { top: -2px;   left: 50%; transform: translateX(-50%); }
    .ornament.left   { left: -2px;  top: 45%;  transform: translateY(-50%) rotate(90deg); }
    .ornament.right  { right: -2px; top: 45%;  transform: translateY(-50%) rotate(90deg); }
  </style>
</head>
<body>
  <div id="frame">
    <div id="bg"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="border-h top"></div>
    <div class="border-h bot"></div>
    <div class="border-v left"></div>
    <div class="border-v right"></div>

    <div class="ornament top">⬥</div>
    <div class="ornament left">⬥</div>
    <div class="ornament right">⬥</div>

    <div id="video-wrapper">
      <div id="yt-player"></div>
    </div>

    <div id="label">
      <span class="dot">⬥</span>
      <span>DoktorP3st ⬥ Paglorieux</span>
      <span class="dot">⬥</span>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    // === CONFIG OBS WEBSOCKET ===
    const OBS_HOST     = "127.0.0.1"; // Laisse 127.0.0.1 si OBS est sur le même PC
    const OBS_PORT     = 4455;           // Port WebSocket OBS (défaut : 4455)
    const OBS_PASSWORD = "TON_MOT_DE_PASSE_ICI"; // Outils → Paramètres WebSocket → Mot de passe

    // === YOUTUBE PLAYER ===
    let player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-player', {
        width: '476',
        height: '268',
        videoId: 'h1zk8rQYskY',
        playerVars: { autoplay: 1, controls: 1, modestbranding: 1, rel: 0 },
        events: { onStateChange: onPlayerStateChange }
      });
    }

    function onPlayerStateChange(event) {
      // YT.PlayerState.ENDED = 0
      if (event.data === 0) {
        stopOBSStream();
      }
      // Démarrage du polling quand la vidéo joue
      if (event.data === 1) {
        startPolling();
      }
    }

    let pollInterval = null;
    let stopped = false;
    function startPolling() {
      if (pollInterval) return;
      pollInterval = setInterval(() => {
        if (stopped) return;
        try {
          const duration = player.getDuration();
          const current  = player.getCurrentTime();
          if (duration > 0 && current > 0 && (duration - current) < 1.5) {
            stopped = true;
            clearInterval(pollInterval);
            stopOBSStream();
          }
        } catch(e) {}
      }, 500);
    }

    // === OBS WEBSOCKET ===
    async function stopOBSStream() {
      try {
        const ws = new WebSocket(`ws://${OBS_HOST}:${OBS_PORT}`);
        ws.onopen = () => {
          ws.onmessage = async (msg) => {
            const data = JSON.parse(msg.data);

            // Hello initial
            if (data.op === 0) {
              const auth = data.d.authentication;
              const secret = await sha256b64(OBS_PASSWORD + auth.salt);
              const authStr = await sha256b64(secret + auth.challenge);
              ws.send(JSON.stringify({ op: 1, d: { rpcVersion: 1, authentication: authStr } }));
            }

            // Identified — on arrête le stream
            if (data.op === 2) {
              ws.send(JSON.stringify({
                op: 6,
                d: {
                  requestType: "StopStream",
                  requestId: "stop-stream",
                  requestData: {}
                }
              }));
              setTimeout(() => ws.close(), 1000);
            }
          };
        };
        ws.onerror = (e) => console.error("OBS WS erreur:", e);
      } catch (e) {
        console.error("Erreur connexion OBS:", e);
      }
    }

    // SHA-256 sans crypto.subtle (compatible OBS Chromium)
    async function sha256b64(str) {
      const bytes = new TextEncoder().encode(str);
      const hashBytes = await sha256Raw(bytes);
      return btoa(String.fromCharCode(...hashBytes));
    }

    function sha256Raw(data) {
      return new Promise((resolve) => {
        const K = [
          0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
          0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
          0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
          0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
          0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
          0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
          0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
          0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
        ];
        let h = [0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
        const len = data.length;
        const bitLen = len * 8;
        let padded = new Uint8Array(Math.ceil((len + 9) / 64) * 64);
        padded.set(data);
        padded[len] = 0x80;
        new DataView(padded.buffer).setUint32(padded.length - 4, bitLen, false);
        for (let i = 0; i < padded.length; i += 64) {
          const w = new Array(64);
          for (let j = 0; j < 16; j++) w[j] = new DataView(padded.buffer).getUint32(i + j * 4, false);
          for (let j = 16; j < 64; j++) {
            const s0 = (w[j-15] >>> 7 | w[j-15] << 25) ^ (w[j-15] >>> 18 | w[j-15] << 14) ^ (w[j-15] >>> 3);
            const s1 = (w[j-2] >>> 17 | w[j-2] << 15) ^ (w[j-2] >>> 19 | w[j-2] << 13) ^ (w[j-2] >>> 10);
            w[j] = (w[j-16] + s0 + w[j-7] + s1) >>> 0;
          }
          let [a,b,c,d,e,f,g,hh] = h;
          for (let j = 0; j < 64; j++) {
            const S1 = (e >>> 6 | e << 26) ^ (e >>> 11 | e << 21) ^ (e >>> 25 | e << 7);
            const ch = (e & f) ^ (~e & g);
            const temp1 = (hh + S1 + ch + K[j] + w[j]) >>> 0;
            const S0 = (a >>> 2 | a << 30) ^ (a >>> 13 | a << 19) ^ (a >>> 22 | a << 10);
            const maj = (a & b) ^ (a & c) ^ (b & c);
            const temp2 = (S0 + maj) >>> 0;
            hh=g; g=f; f=e; e=(d+temp1)>>>0; d=c; c=b; b=a; a=(temp1+temp2)>>>0;
          }
          h = h.map((v,i) => ([a,b,c,d,e,f,g,hh][i] + v) >>> 0);
        }
        const result = new Uint8Array(32);
        h.forEach((v,i) => new DataView(result.buffer).setUint32(i*4, v, false));
        resolve(result);
      });
    }
  </script>
</body>
</html>
