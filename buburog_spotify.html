<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>BubuRog — Spotify</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Open+Sans:wght@400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      width: 550px;
      height: 200px;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 6px 8px;
    }
    #container {
      display: flex;
      flex-direction: row;
      gap: 14px;
      width: 100%;
      height: 188px;
      background: rgba(0, 0, 0, 0.75);
      border-left: 3px solid #1DB954;
      border-radius: 0 4px 4px 0;
      padding: 12px 16px;
      align-items: center;
    }
    #album-art {
      width: 130px;
      height: 130px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      border: 1px solid #222;
    }
    #info {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
    }
    #now-playing-label {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: #1DB954;
      letter-spacing: 2px;
      white-space: nowrap;
    }
    #track {
      font-family: 'Open Sans', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #artist {
      font-family: 'Open Sans', sans-serif;
      font-size: 16px;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #progress-bar-container {
      width: 100%;
      max-width: 100%;
      height: 5px;
      background: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
      display: block;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #1DB954;
      border-radius: 2px;
      transition: width 1s linear;
    }
    #time-row {
      display: flex;
      justify-content: space-between;
      font-family: 'Open Sans', sans-serif;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <div id="container">
    <img id="album-art" src="" alt="Album"/>
    <div id="info">
      <div id="now-playing-label">♪ NOW PLAYING · EN CE MOMENT</div>
      <div id="track">Chargement...</div>
      <div id="artist"></div>
      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>
      <div id="time-row">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>
  </div>
  <script>
    const CLIENT_ID     = "TON_CLIENT_ID_ICI";       // developer.spotify.com → Dashboard → Client ID
    const CLIENT_SECRET = "TON_CLIENT_SECRET_ICI";   // developer.spotify.com → Dashboard → Client Secret
    const REFRESH_TOKEN = "TON_REFRESH_TOKEN_ICI";   // Voir README pour générer ce token
    let accessToken = null, progressInterval = null, lastTrackId = null;
    const trackEl = document.getElementById("track");
    const artistEl = document.getElementById("artist");
    const progressEl = document.getElementById("progress-bar");
    const timeCurrent = document.getElementById("time-current");
    const timeTotal = document.getElementById("time-total");
    const albumArt = document.getElementById("album-art");
    function formatMs(ms) {
      const s = Math.floor(ms / 1000);
      return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
    }
    async function getAccessToken() {
      const response = await fetch("https://accounts.spotify.com/api/token", {
        method: "POST",
        headers: { "Authorization": "Basic " + btoa(CLIENT_ID + ":" + CLIENT_SECRET), "Content-Type": "application/x-www-form-urlencoded" },
        body: "grant_type=refresh_token&refresh_token=" + encodeURIComponent(REFRESH_TOKEN)
      });
      const data = await response.json();
      accessToken = data.access_token;
    }
    async function fetchNowPlaying() {
      try {
        if (!accessToken) await getAccessToken();
        const response = await fetch("https://api.spotify.com/v1/me/player/currently-playing", { headers: { "Authorization": "Bearer " + accessToken } });
        if (response.status === 401) { accessToken = null; await getAccessToken(); return; }
        if (response.status === 204 || !response.ok) { trackEl.textContent = "Aucune musique en cours"; artistEl.textContent = ""; progressEl.style.width = "0%"; albumArt.src = ""; if (progressInterval) clearInterval(progressInterval); return; }
        const data = await response.json();
        if (!data || !data.item) return;
        const newTrackId = data.item.id;
        const newTrack = data.item.name;
        const newArtist = data.item.artists.map(a => a.name).join(", ");
        const duration = data.item.duration_ms;
        const progress = data.progress_ms;
        const isPlaying = data.is_playing;
        const artwork = data.item.album.images[1] ? data.item.album.images[1].url : data.item.album.images[0].url;
        trackEl.textContent = newTrack;
        artistEl.textContent = newArtist;
        timeTotal.textContent = formatMs(duration);
        if (newTrackId !== lastTrackId) { albumArt.src = artwork; lastTrackId = newTrackId; }
        if (progressInterval) clearInterval(progressInterval);
        let current = progress;
        progressEl.style.width = (current / duration * 100) + "%";
        timeCurrent.textContent = formatMs(current);
        if (isPlaying) {
          progressInterval = setInterval(() => {
            current += 1000;
            if (current > duration) current = duration;
            progressEl.style.width = (current / duration * 100) + "%";
            timeCurrent.textContent = formatMs(current);
          }, 1000);
        }
      } catch (err) { console.error("Erreur Spotify :", err); accessToken = null; }
    }
    fetchNowPlaying();
    setInterval(fetchNowPlaying, 10000);
  </script>
</body>
</html>
